<!DOCTYPE html>
<html>
<head>
    <title>Test de Conectividad Avatar API</title>
</head>
<body>
    <h1>🧪 Test de Conectividad - Avatar API</h1>
    <div id="status">Probando conexión...</div>
    <div id="results"></div>

    <script>
        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            try {
                statusDiv.innerHTML = '🔄 Probando conexión al backend...';
                
                // Test 1: Endpoint de avatars
                const apiResponse = await fetch('http://localhost:8000/avatar/assets?gender=male');
                
                if (apiResponse.ok) {
                    const data = await apiResponse.json();
                    statusDiv.innerHTML = '✅ ¡Conexión exitosa al API!';
                    resultsDiv.innerHTML = `
                        <h3>📊 Resultados del Test:</h3>
                        <p><strong>Estado API:</strong> ✅ Funcionando</p>
                        <p><strong>Total assets:</strong> ${Object.values(data.categories).reduce((acc, assets) => acc + assets.length, 0)}</p>
                        <p><strong>Categorías:</strong> ${Object.keys(data.categories).join(', ')}</p>
                        
                        <h4>🖼️ Test de Imagen:</h4>
                        <img src="http://localhost:8000/static/assets/base/male_base.jpeg" 
                             style="max-width: 200px; border: 2px solid green;" 
                             onload="this.nextElementSibling.innerHTML='✅ Imagen carga correctamente'"
                             onerror="this.nextElementSibling.innerHTML='❌ Error cargando imagen'">
                        <p>⏳ Cargando imagen...</p>
                        
                        <h4>📋 Datos de respuesta:</h4>
                        <pre style="background: #f5f5f5; padding: 10px; overflow: auto; max-height: 300px;">
${JSON.stringify(data, null, 2)}
                        </pre>
                    `;
                } else {
                    throw new Error(`HTTP ${apiResponse.status}: ${apiResponse.statusText}`);
                }
                
            } catch (error) {
                statusDiv.innerHTML = '❌ Error de conexión';
                resultsDiv.innerHTML = `
                    <h3>🚨 Error:</h3>
                    <p style="color: red;"><strong>Mensaje:</strong> ${error.message}</p>
                    
                    <h4>🔧 Posibles soluciones:</h4>
                    <ul>
                        <li>Verificar que el backend esté ejecutándose en puerto 8000</li>
                        <li>Comprobar configuración de CORS</li>
                        <li>Verificar que no haya firewall bloqueando la conexión</li>
                    </ul>
                    
                    <h4>🧪 Tests manuales:</h4>
                    <p>Abrir en una nueva pestaña:</p>
                    <a href="http://localhost:8000/avatar/assets?gender=male" target="_blank">
                        Test de API endpoint
                    </a><br>
                    <a href="http://localhost:8000/static/assets/base/male_base.jpeg" target="_blank">
                        Test de imagen estática
                    </a>
                `;
            }
        }
        
        // Ejecutar test al cargar la página
        testConnection();
    </script>
</body>
</html>
