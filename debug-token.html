<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Token Acadify</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .token-info { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Debug Token Acadify</h1>

    <div id="token-info" class="token-info">
        <h3>Información del Token</h3>
        <div id="token-details"></div>
    </div>

    <div class="token-info">
        <h3>Acciones de Debug</h3>
        <button onclick="checkToken()">Verificar Token</button>
        <button onclick="testDownload()">Probar Descarga</button>
        <button onclick="clearToken()">Limpiar Token</button>
        <button onclick="reloadPage()">Recargar Página</button>
    </div>

    <div id="results" class="token-info">
        <h3>Resultados</h3>
        <div id="results-content"></div>
    </div>

    <script>
        function checkToken() {
            const token = localStorage.getItem('access_token');
            const results = document.getElementById('results-content');

            let html = '<h4>Estado del Token:</h4>';

            if (!token) {
                html += '<p class="error">❌ No hay token en localStorage</p>';
            } else {
                html += `<p class="success">✅ Token encontrado (${token.length} caracteres)</p>`;
                html += `<p><strong>Primeros 50 caracteres:</strong> ${token.substring(0, 50)}...</p>`;

                // Verificar formato JWT
                const parts = token.split('.');
                html += `<p><strong>Partes del JWT:</strong> ${parts.length}</p>`;

                if (parts.length === 3) {
                    html += '<p class="success">✅ Formato JWT válido</p>';

                    try {
                        // Decodificar header
                        const header = JSON.parse(atob(parts[0]));
                        html += `<p><strong>Header:</strong> ${JSON.stringify(header, null, 2)}</p>`;

                        // Decodificar payload
                        const payload = JSON.parse(atob(parts[1]));
                        html += `<p><strong>Payload:</strong></p>`;
                        html += `<ul>`;
                        html += `<li><strong>sub (usuario):</strong> ${payload.sub || 'N/A'}</li>`;
                        html += `<li><strong>exp (expiración):</strong> ${payload.exp ? new Date(payload.exp * 1000).toLocaleString() : 'N/A'}</li>`;
                        html += `<li><strong>iat (emitido):</strong> ${payload.iat ? new Date(payload.iat * 1000).toLocaleString() : 'N/A'}</li>`;
                        html += `<li><strong>type:</strong> ${payload.type || 'N/A'}</li>`;
                        html += `<li><strong>email:</strong> ${payload.email || payload.user_email || 'N/A'}</li>`;
                        html += `</ul>`;

                        // Verificar expiración
                        if (payload.exp) {
                            const now = Date.now() / 1000;
                            if (payload.exp < now) {
                                html += '<p class="error">❌ Token expirado</p>';
                            } else {
                                html += '<p class="success">✅ Token válido (no expirado)</p>';
                            }
                        }
                    } catch (e) {
                        html += `<p class="error">❌ Error decodificando token: ${e.message}</p>`;
                    }
                } else {
                    html += '<p class="error">❌ Formato JWT inválido (debe tener 3 partes)</p>';
                }
            }

            results.innerHTML = html;
        }

        async function testDownload() {
            const token = localStorage.getItem('access_token');
            const results = document.getElementById('results-content');

            if (!token) {
                results.innerHTML = '<p class="error">❌ No hay token para probar</p>';
                return;
            }

            try {
                results.innerHTML = '<p>🔄 Probando descarga...</p>';

                const response = await fetch('http://localhost:8000/api/cursos/archivos/descargar/test-id', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });

                let html = `<h4>Resultado de la petición:</h4>`;
                html += `<p><strong>Status:</strong> ${response.status} ${response.statusText}</p>`;

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    html += `<p class="error"><strong>Error:</strong> ${errorData.detail || 'Error desconocido'}</p>`;
                } else {
                    html += '<p class="success">✅ Petición exitosa</p>';
                }

                results.innerHTML = html;
            } catch (error) {
                results.innerHTML = `<p class="error">❌ Error en la petición: ${error.message}</p>`;
            }
        }

        function clearToken() {
            localStorage.removeItem('access_token');
            document.getElementById('results-content').innerHTML = '<p>🗑️ Token eliminado</p>';
            checkToken();
        }

        function reloadPage() {
            window.location.reload();
        }

        // Verificar token al cargar la página
        window.onload = checkToken;
    </script>
</body>
</html>
