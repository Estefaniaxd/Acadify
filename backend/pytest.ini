[pytest]
testpaths = TEST tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

markers =
    unit: Tests unitarios de modelos
    modelo: Tests de modelos de datos
    crud: Tests de operaciones CRUD
    service: Tests de capa de servicio
    api: Tests de endpoints API
    integration: Tests de integración
    e2e: Tests End-to-End del flujo institucional completo
    performance: Tests de rendimiento y carga
    slow: Tests que tardan más de 1 segundo
    academic: Tests de modelos académicos
    inscripciones: Tests de sistema de inscripciones
    periodos: Tests de sistema de períodos académicos
    
# Configure coverage
[coverage:run]
source = src
omit = 
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
