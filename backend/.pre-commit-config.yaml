# Pre-commit hooks configuration for Acadify Backend
# See https://pre-commit.com for more information

# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

repos:
  # ============================================================================
  # RUFF - Fast Python linter and formatter (replaces: black, isort, flake8)
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      # Run the Ruff linter
      - id: ruff
        name: 🔍 Ruff Linter
        args: 
          - --fix              # Auto-fix safe issues
          - --exit-non-zero-on-fix  # Exit with error if fixes were applied
          - --show-fixes       # Show what was fixed
        types_or: [python, pyi]
        
      # Run the Ruff formatter
      - id: ruff-format
        name: ✨ Ruff Formatter
        types_or: [python, pyi]

  # ============================================================================
  # GENERAL FILE CHECKS - Fix common issues
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Prevent committing large files
      - id: check-added-large-files
        name: 🚫 Check for large files
        args: ['--maxkb=1000']  # Max 1MB
        
      # Check YAML syntax
      - id: check-yaml
        name: 📝 Check YAML syntax
        args: ['--unsafe']  # Allow custom tags
        
      # Check TOML syntax
      - id: check-toml
        name: 📝 Check TOML syntax
        
      # Check JSON syntax
      - id: check-json
        name: 📝 Check JSON syntax
        
      # Ensure files end with newline
      - id: end-of-file-fixer
        name: 📄 Fix end of files
        exclude: '^(\.idea|\.vscode|\.git)'
        
      # Remove trailing whitespace
      - id: trailing-whitespace
        name: ✂️ Trim trailing whitespace
        exclude: '^(\.idea|\.vscode|\.git)'
        args: ['--markdown-linebreak-ext=md']
        
      # Check for merge conflict markers
      - id: check-merge-conflict
        name: 🔀 Check merge conflicts
        
      # Prevent committing to protected branches
      - id: no-commit-to-branch
        name: 🔒 Protect main branch
        args: ['--branch', 'main', '--branch', 'master']
        
      # Check for files that would conflict on case-insensitive filesystems
      - id: check-case-conflict
        name: 📁 Check case conflicts
        
      # Detect private keys
      - id: detect-private-key
        name: 🔐 Detect private keys

  # ============================================================================
  # PYTHON-SPECIFIC CHECKS
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Check for debugger imports and breakpoints
      - id: debug-statements
        name: 🐛 Check for debugger statements
        
      # Check docstring is first in files
      - id: check-docstring-first
        name: 📚 Check docstring first
        
      # Validate Python syntax
      - id: check-ast
        name: 🐍 Validate Python syntax

  # ============================================================================
  # SECURITY CHECKS
  # ============================================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: 🔒 Security check (Bandit)
        args: 
          - -c
          - pyproject.toml
        additional_dependencies: ["bandit[toml]"]
        exclude: '^(TEST|test_|tests/)'

# ============================================================================
# CONFIGURATION
# ============================================================================

# Fail fast: stop running hooks after first failure
fail_fast: false

# Default language version
default_language_version:
  python: python3.12

# Files to exclude from all hooks
exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    venv/|
    __pycache__/|
    \.pytest_cache/|
    \.mypy_cache/|
    \.ruff_cache/|
    alembic/versions/.*\.py|
    BACKUP_LEGACY/|
    TEST/deprecated_routers/|
    .*\.pyc|
    .*\.pyo|
    .*\.pyd|
    .*\.so|
    .*\.egg-info/
  )$
